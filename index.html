<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1720" />
    <title>電子黒板</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>電子黒板</h1>
          <p id="syncStatus">端末内に自動保存</p>
        </div>
        <button class="icon-button" id="newBoardButton" type="button" aria-label="新規作成">
          <span aria-hidden="true">+</span>
        </button>
      </header>

      <main>
        <section class="project-strip" aria-label="現場">
          <label for="projectSelect">現場</label>
          <select id="projectSelect"></select>
          <button id="saveProjectButton" type="button">登録</button>
        </section>

        <nav class="step-tabs" aria-label="作業ステップ">
          <button class="active" type="button" data-panel="inputPanel">入力</button>
          <button type="button" data-panel="previewPanel">黒板</button>
          <button type="button" data-panel="photoPanel">写真</button>
        </nav>

        <section class="panel active" id="inputPanel" aria-labelledby="inputHeading">
          <div class="section-head">
            <h2 id="inputHeading">黒板情報</h2>
            <div class="head-actions">
              <button id="copyLastButton" type="button">前回複製</button>
              <button class="save-and-next-action" id="saveAndNextButton" type="button">次へ保存</button>
            </div>
          </div>

          <button class="wide-action prep-next-action save-and-next-action" id="saveAndNextTopWideButton" type="button">この黒板を保存して次へ</button>

          <form id="boardForm" class="field-grid">
            <label>
              工事件名
              <input id="projectName" name="projectName" autocomplete="organization" required />
            </label>
            <fieldset class="board-items span-2">
              <legend>黒板表示項目</legend>
              <div class="item-row">
                <label class="item-toggle"><input id="showWorkType" name="showWorkType" type="checkbox" />表示</label>
                <label>
                  項目名
                  <input id="labelWorkType" name="labelWorkType" />
                </label>
                <label class="item-value">
                  内容
                  <input id="workType" name="workType" list="workTypeList" required />
                </label>
              </div>
              <div class="item-row">
                <label class="item-toggle"><input id="showLocation" name="showLocation" type="checkbox" />表示</label>
                <label>
                  項目名
                  <input id="labelLocation" name="labelLocation" />
                </label>
                <label class="item-value">
                  内容
                  <input id="location" name="location" placeholder="右岸側 排水路" />
                </label>
              </div>
              <div class="item-row">
                <label class="item-toggle"><input id="showWorkDate" name="showWorkDate" type="checkbox" />表示</label>
                <label>
                  項目名
                  <input id="labelWorkDate" name="labelWorkDate" />
                </label>
                <label class="item-value">
                  内容
                  <input id="workDate" name="workDate" type="date" required />
                </label>
              </div>
              <div class="item-row">
                <label class="item-toggle"><input id="showWorker" name="showWorker" type="checkbox" />表示</label>
                <label>
                  項目名
                  <input id="labelWorker" name="labelWorker" />
                </label>
                <label class="item-value">
                  内容
                  <input id="worker" name="worker" autocomplete="name" />
                </label>
              </div>
              <div class="item-row">
                <label class="item-toggle"><input id="showWorkContent" name="showWorkContent" type="checkbox" />表示</label>
                <label>
                  項目名
                  <input id="labelWorkContent" name="labelWorkContent" />
                </label>
                <label class="item-value">
                  内容
                  <textarea id="workContent" name="workContent" rows="4" placeholder="施工前確認&#10;出来形確認&#10;品質確認&#10;完了確認"></textarea>
                </label>
              </div>
              <div class="item-row">
                <label class="item-toggle"><input id="showNote" name="showNote" type="checkbox" />表示</label>
                <label>
                  項目名
                  <input id="labelNote" name="labelNote" />
                </label>
                <label class="item-value">
                  内容
                  <textarea id="note" name="note" rows="2" placeholder="施工前、出来形確認など"></textarea>
                </label>
              </div>
            </fieldset>
            <button class="wide-action prep-next-action save-and-next-action span-2" id="saveAndNextWideButton" type="button">この黒板を保存して次へ</button>
          </form>

          <datalist id="workTypeList">
            <option value="掘削工"></option>
            <option value="型枠工"></option>
            <option value="鉄筋工"></option>
            <option value="コンクリート工"></option>
            <option value="舗装工"></option>
            <option value="出来形測定"></option>
          </datalist>

          <section class="board-list-section" aria-labelledby="historyHeading">
            <div class="section-head">
              <h2 id="historyHeading">保存した黒板一覧</h2>
              <button id="exportCsvButton" type="button">CSV</button>
            </div>
            <div class="export-row">
              <button id="exportJsonButton" type="button">写真帳JSONを書き出し</button>
              <button id="clearHistoryButton" type="button">全削除</button>
            </div>
            <ol class="history-list" id="historyList"></ol>
          </section>
        </section>

        <section class="panel" id="previewPanel" aria-labelledby="previewHeading">
          <div class="section-head">
            <h2 id="previewHeading">黒板プレビュー</h2>
            <div class="size-control" aria-label="黒板サイズ">
              <button class="active" type="button" data-board-size="compact">小</button>
              <button type="button" data-board-size="large">大</button>
            </div>
          </div>
          <div class="board-stage">
            <div class="blackboard" id="blackboardPreview" aria-label="電子黒板プレビュー"></div>
          </div>
        </section>

        <section class="panel" id="photoPanel" aria-labelledby="photoHeading">
          <div class="section-head">
            <h2 id="photoHeading">写真合成</h2>
            <button id="clearPhotoButton" type="button">写真解除</button>
          </div>

          <div class="shoot-board-select">
            <label>
              使う黒板
              <select id="shootBoardSelect"></select>
            </label>
            <button id="editSelectedBoardButton" type="button">編集</button>
          </div>

          <label class="photo-picker" for="photoInput">
            <input id="photoInput" type="file" accept="image/*" capture="environment" />
            <span>写真を撮る / 選ぶ</span>
            <strong id="photoName">未選択</strong>
          </label>

          <div class="compose-options">
            <label>
              配置
              <select id="boardPosition">
                <option value="bottom-left">左下</option>
                <option value="bottom-right">右下</option>
                <option value="top-left">左上</option>
                <option value="top-right">右上</option>
              </select>
            </label>
            <label>
              大きさ
              <input id="boardScale" type="range" min="22" max="48" value="34" />
            </label>
          </div>

          <canvas id="composeCanvas" width="1280" height="960" aria-label="合成結果"></canvas>
          <a class="download-link" id="downloadLink" download="electronic-board-photo.jpg">合成画像を保存</a>
        </section>
      </main>

      <footer class="action-bar">
        <button id="duplicateButton" type="button">次の黒板</button>
        <button id="composeButton" class="primary" type="button">合成</button>
        <button id="saveButton" class="success" type="button">保存</button>
      </footer>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
