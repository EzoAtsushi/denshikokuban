<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1720">
  <title>電子黒板</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <style>
    :root{--bg:#eef2f5;--surface:#fff;--surface2:#f8fafc;--text:#15202a;--muted:#667483;--line:#d7dee6;--primary:#1266d6;--success:#11845b;--board:#07100b;--yellow:#ffd94a;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color-scheme:light}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-size:15px;letter-spacing:0}button,input,select,textarea{font:inherit;border-radius:8px}button{min-height:42px;border:1px solid var(--line);background:#fff;color:var(--text);font-weight:800}button:active{transform:translateY(1px)}.app{width:min(100%,480px);min-height:100svh;margin:auto;padding:env(safe-area-inset-top) 12px calc(76px + env(safe-area-inset-bottom));background:linear-gradient(180deg,#f9fbfd 0%,var(--bg) 42%)}.top{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;align-items:center;padding:12px 0 10px;background:rgba(249,251,253,.94);backdrop-filter:blur(14px)}h1{margin:0;font-size:28px;line-height:1.1}.top p{margin:4px 0 0;color:var(--muted);font-size:12px}.new{width:44px;min-height:44px;border:0;background:var(--text);color:white;font-size:28px}.project,.tabs,.panel,.bar{box-shadow:0 16px 40px rgba(21,32,42,.14)}.project{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:8px;background:#fff}.project label,label{color:var(--muted);font-size:12px;font-weight:850}.project select{min-width:0}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:10px 0;padding:4px;border-radius:8px;background:#dfe6ee}.tabs button,.size button{border:0;background:transparent;color:#4e5c69;font-size:13px}.tabs .active,.size .active{background:#fff;color:var(--text);box-shadow:0 3px 12px rgba(21,32,42,.13)}.panel{display:none;margin-bottom:12px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fff}.panel.active{display:block}.head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.head h2{margin:0;font-size:20px}.head button{padding:0 12px;font-size:13px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{display:grid;gap:5px}.span{grid-column:1/-1}input,select,textarea{width:100%;min-height:42px;border:1px solid var(--line);background:var(--surface2);color:var(--text);padding:9px 10px;font-size:15px;font-weight:650}textarea{min-height:58px;resize:vertical}.size{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:3px;background:#e9eef4;border-radius:8px}.stage{padding:10px;background:#dfe6ee;border-radius:8px;overflow:hidden}.blackboard{width:100%;aspect-ratio:4/3;display:grid;grid-template-rows:auto 1fr;overflow:hidden;background:var(--board);color:white;border:3px solid #26342c;border-radius:6px}.blackboard.large{aspect-ratio:16/10}.bt{display:flex;justify-content:space-between;gap:8px;padding:7px 8px;background:var(--yellow);color:#111;font-size:clamp(12px,3.7vw,17px);font-weight:900;line-height:1.2}.table{display:grid;grid-template-columns:74px 1fr;border-top:2px solid rgba(255,255,255,.72);font-weight:850}.cell{min-width:0;display:flex;align-items:center;padding:5px 7px;border-right:1px solid rgba(255,255,255,.72);border-bottom:1px solid rgba(255,255,255,.72);line-height:1.22;word-break:break-word}.labelCell{justify-content:center;font-size:clamp(10px,3vw,13px);background:rgba(255,255,255,.05)}.valueCell{font-size:clamp(12px,3.5vw,16px)}.photoPick{min-height:86px;display:flex;align-items:center;justify-content:center;gap:6px;border:2px dashed #aeb9c5;background:var(--surface2);color:var(--text);text-align:center;border-radius:8px}.photoPick input{position:absolute;width:1px;height:1px;opacity:0}.photoPick span{display:block;font-size:16px;font-weight:850}.photoPick strong{display:block;color:var(--muted);font-size:12px;word-break:break-all}.opts{display:grid;grid-template-columns:.8fr 1fr;gap:10px;margin:12px 0}canvas{width:100%;display:block;background:#c6d0d9;border-radius:8px}.download{display:block;min-height:44px;margin-top:10px;padding:12px;border-radius:8px;background:var(--primary);color:white;text-align:center;text-decoration:none;font-weight:850}.download[aria-disabled=true]{opacity:.48;pointer-events:none}.export{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:10px}.history{display:grid;gap:8px;margin:0;padding:0;list-style:none}.history li{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px;border:1px solid var(--line);border-radius:8px;background:var(--surface2)}.history h3{margin:0 0 4px;font-size:14px}.history p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}.history button{min-height:36px;padding:0 10px;font-size:12px}.bar{position:fixed;left:max(12px,calc((100vw - 480px)/2 + 12px));right:max(12px,calc((100vw - 480px)/2 + 12px));bottom:env(safe-area-inset-bottom);z-index:10;display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:8px;padding:10px;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:8px 8px 0 0;backdrop-filter:blur(14px)}.bar button{min-height:48px}.primary{border-color:#0a4eaa;background:var(--primary);color:white}.success{border-color:#0b6b48;background:var(--success);color:white}@media(max-width:360px){.app{padding-left:8px;padding-right:8px}.grid,.opts{grid-template-columns:1fr}.span{grid-column:auto}.table{grid-template-columns:64px 1fr}}
  </style>
</head>
<body>
  <div class="app">
    <header class="top"><div><h1>電子黒板</h1><p id="syncStatus">端末内に自動保存</p></div><button class="new" id="newBoardButton" type="button" aria-label="新規作成">+</button></header>
    <main>
      <section class="project" aria-label="現場"><label for="projectSelect">現場</label><select id="projectSelect"></select><button id="saveProjectButton" type="button">登録</button></section>
      <nav class="tabs" aria-label="作業ステップ"><button class="active" type="button" data-panel="inputPanel">入力</button><button type="button" data-panel="previewPanel">黒板</button><button type="button" data-panel="photoPanel">写真</button><button type="button" data-panel="historyPanel">履歴</button></nav>
      <section class="panel active" id="inputPanel"><div class="head"><h2>黒板情報</h2><button id="copyLastButton" type="button">前回複製</button></div><form id="boardForm" class="grid"><label>工事件名<input id="projectName" name="projectName" autocomplete="organization" required></label><label>工種<input id="workType" name="workType" list="workTypeList" required></label><label>測点<input id="station" name="station" placeholder="No.12+5.0"></label><label>場所<input id="location" name="location" placeholder="右岸側 排水路"></label><label>施工日<input id="workDate" name="workDate" type="date" required></label><label>施工者<input id="worker" name="worker" autocomplete="name"></label><label class="span">備考<textarea id="note" name="note" rows="2" placeholder="施工前、出来形確認など"></textarea></label><label>写真番号<input id="photoNumber" name="photoNumber" inputmode="numeric"></label><label>写真帳分類<select id="albumCategory" name="albumCategory"><option>施工状況</option><option>出来形管理</option><option>品質管理</option><option>安全管理</option><option>材料検収</option><option>その他</option></select></label></form><datalist id="workTypeList"><option value="掘削工"><option value="型枠工"><option value="鉄筋工"><option value="コンクリート工"><option value="舗装工"><option value="出来形測定"></datalist></section>
      <section class="panel" id="previewPanel"><div class="head"><h2>黒板プレビュー</h2><div class="size"><button class="active" type="button" data-size="compact">小</button><button type="button" data-size="large">大</button></div></div><div class="stage"><div class="blackboard" id="blackboardPreview"></div></div></section>
      <section class="panel" id="photoPanel"><div class="head"><h2>写真合成</h2><button id="clearPhotoButton" type="button">写真解除</button></div><label class="photoPick" for="photoInput"><input id="photoInput" type="file" accept="image/*" capture="environment"><span>写真を撮る / 選ぶ</span><strong id="photoName">未選択</strong></label><div class="opts"><label>配置<select id="boardPosition"><option value="bottom-left">左下</option><option value="bottom-right">右下</option><option value="top-left">左上</option><option value="top-right">右上</option></select></label><label>大きさ<input id="boardScale" type="range" min="22" max="48" value="34"></label></div><canvas id="composeCanvas" width="1280" height="960"></canvas><a class="download" id="downloadLink" download="electronic-board-photo.jpg" aria-disabled="true">合成画像を保存</a></section>
      <section class="panel" id="historyPanel"><div class="head"><h2>履歴と写真帳連携</h2><button id="exportCsvButton" type="button">CSV</button></div><div class="export"><button id="exportJsonButton" type="button">写真帳JSONを書き出し</button><button id="clearHistoryButton" type="button">履歴削除</button></div><ol class="history" id="historyList"></ol></section>
    </main>
    <footer class="bar"><button id="duplicateButton" type="button">複製</button><button id="composeButton" class="primary" type="button">合成</button><button id="saveButton" class="success" type="button">保存</button></footer>
  </div>
<script>
const KEY='construction-board-v1';
const def={projectName:'〇〇道路改良工事',workType:'施工状況',station:'No.1',location:'現場内',workDate:new Date().toISOString().slice(0,10),worker:'',note:'',photoNumber:'1',albumCategory:'施工状況'};
const st={board:{...def},history:[],projects:['〇〇道路改良工事'],panel:'inputPanel',size:'compact',photo:null,url:''};
const $=s=>document.querySelector(s);const $$=s=>document.querySelectorAll(s);
const el={sync:$('#syncStatus'),project:$('#projectSelect'),form:$('#boardForm'),preview:$('#blackboardPreview'),photoInput:$('#photoInput'),photoName:$('#photoName'),pos:$('#boardPosition'),scale:$('#boardScale'),canvas:$('#composeCanvas'),download:$('#downloadLink'),history:$('#historyList')};
function load(){try{const raw=localStorage.getItem(KEY);if(raw){const saved=JSON.parse(raw);Object.assign(st,{...saved,board:{...def,...saved.board},photo:null,url:''});}}catch{localStorage.removeItem(KEY)}}
function save(){localStorage.setItem(KEY,JSON.stringify({board:st.board,history:st.history,projects:st.projects,panel:st.panel,size:st.size}));el.sync.textContent='端末内に保存済み '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});}
function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function read(){st.board=Object.fromEntries(new FormData(el.form).entries())}
function fill(){Object.entries(st.board).forEach(([k,v])=>{const f=el.form.elements.namedItem(k);if(f)f.value=v??''})}
function date(v){if(!v)return'';const d=new Date(v+'T00:00:00');return Number.isNaN(d.getTime())?v:d.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'})}
function panel(id){st.panel=id;$$('.panel').forEach(p=>p.classList.toggle('active',p.id===id));$$('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.panel===id));save()}
function projects(){const opts=[...new Set([st.board.projectName,...st.projects].filter(Boolean))];st.projects=opts;el.project.innerHTML=opts.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');el.project.value=st.board.projectName}
function board(){const rows=[['工種',st.board.workType],['測点',st.board.station],['場所',st.board.location],['施工日',date(st.board.workDate)],['施工者',st.board.worker],['備考',st.board.note]];el.preview.classList.toggle('large',st.size==='large');el.preview.innerHTML=`<div class="bt"><span>${esc(st.board.projectName||'工事件名')}</span><span>No.${esc(st.board.photoNumber||'-')}</span></div><div class="table">${rows.map(([l,v])=>`<div class="cell labelCell">${esc(l)}</div><div class="cell valueCell">${esc(v||'-')}</div>`).join('')}</div>`}
function renderHistory(){if(!st.history.length){el.history.innerHTML='<li><div><h3>まだ履歴がありません</h3><p>保存すると写真帳用データとしてここに残ります。</p></div></li>';return}el.history.innerHTML=st.history.map(r=>`<li><div><h3>No.${esc(r.photoNumber||'-')} ${esc(r.workType||'工種未入力')}</h3><p>${esc(r.projectName||'')}</p><p>${esc(r.albumCategory||'施工状況')} / ${esc(date(r.workDate))} / ${esc(r.location||'-')}</p></div><button type="button" data-copy="${r.id}">再利用</button></li>`).join('')}
function render(){projects();board();renderHistory()}
function record(extra={}){return{id:crypto.randomUUID(),createdAt:new Date().toISOString(),...st.board,...extra}}
function saveBoard(){read();const r=record();st.history=[r,...st.history].slice(0,80);if(st.board.projectName&&!st.projects.includes(st.board.projectName))st.projects.unshift(st.board.projectName);save();render();return r}
function duplicate(){const n=parseInt(st.board.photoNumber||'0',10)+1;st.board={...st.board,photoNumber:Number.isFinite(n)?String(n):st.board.photoNumber};fill();render();save()}
function copy(r){const{id,createdAt,composedImageName,...b}=r;st.board={...def,...b};fill();render();panel('inputPanel')}
function drawText(ctx,text,x,y,maxW,maxH){const chars=String(text||'-').split('');let lines=[''];for(const ch of chars){const next=lines[lines.length-1]+ch;if(ctx.measureText(next).width>maxW&&lines[lines.length-1])lines.push(ch);else lines[lines.length-1]=next}const lh=Math.min(maxH/Math.max(1,lines.length),parseInt(ctx.font,10)*1.18);const top=y-lh*lines.length/2+lh/2;lines.slice(0,2).forEach((line,i)=>{let s=line;while(ctx.measureText(s).width>maxW&&s.length>1)s=s.slice(0,-2)+'…';ctx.fillText(s,x,top+lh*i)})}
function drawBoard(ctx,x,y,w,b){const h=Math.round(w*.68),lw=Math.round(w*.24),th=Math.round(h*.18);const rows=[['工種',b.workType],['測点',b.station],['場所',b.location],['施工日',date(b.workDate)],['施工者',b.worker],['備考',b.note]],rh=(h-th)/rows.length;ctx.save();ctx.fillStyle='#07100b';ctx.fillRect(x,y,w,h);ctx.strokeStyle='#e7f0e7';ctx.lineWidth=Math.max(2,w*.006);ctx.strokeRect(x,y,w,h);ctx.fillStyle='#ffd94a';ctx.fillRect(x,y,w,th);ctx.fillStyle='#111';ctx.font=`800 ${Math.max(16,w*.045)}px sans-serif`;ctx.textBaseline='middle';drawText(ctx,b.projectName||'工事件名',x+10,y+th/2,w-80,th*.8);ctx.textAlign='right';ctx.fillText('No.'+(b.photoNumber||'-'),x+w-10,y+th/2);ctx.textAlign='left';ctx.strokeStyle='rgba(255,255,255,.78)';ctx.lineWidth=Math.max(1,w*.0035);ctx.beginPath();ctx.moveTo(x,y+th);ctx.lineTo(x+w,y+th);ctx.moveTo(x+lw,y+th);ctx.lineTo(x+lw,y+h);rows.forEach((_,i)=>{const yy=y+th+rh*(i+1);ctx.moveTo(x,yy);ctx.lineTo(x+w,yy)});ctx.stroke();rows.forEach(([l,v],i)=>{const yy=y+th+rh*i;ctx.fillStyle='#f7fff8';ctx.font=`800 ${Math.max(12,w*.033)}px sans-serif`;ctx.textAlign='center';ctx.fillText(l,x+lw/2,yy+rh/2+1);ctx.textAlign='left';ctx.font=`800 ${Math.max(13,w*.038)}px sans-serif`;drawText(ctx,v||'-',x+lw+8,yy+rh/2,w-lw-16,rh*.86)});ctx.restore()}
function imageName(){const p=(st.board.projectName||'project').replace(/[\\/:*?"<>|\s]+/g,'_');return `${p}_${st.board.photoNumber||'no'}_${st.board.workDate||'date'}.jpg`}
function compose(){read();const c=el.canvas,ctx=c.getContext('2d'),w=st.photo?.naturalWidth||1280,h=st.photo?.naturalHeight||960;c.width=w;c.height=h;if(st.photo)ctx.drawImage(st.photo,0,0,w,h);else{ctx.fillStyle='#c6d0d9';ctx.fillRect(0,0,w,h);ctx.fillStyle='#51606f';ctx.font='700 42px sans-serif';ctx.textAlign='center';ctx.fillText('写真未選択',w/2,h/2);ctx.textAlign='left'}const bw=Math.round(w*(Number(el.scale.value)/100)),bh=Math.round(bw*.68),m=Math.round(w*.025),p=el.pos.value,x=p.endsWith('right')?w-bw-m:m,y=p.startsWith('top')?m:h-bh-m;drawBoard(ctx,x,y,bw,st.board);if(st.url)URL.revokeObjectURL(st.url);c.toBlob(blob=>{if(!blob)return;st.url=URL.createObjectURL(blob);el.download.href=st.url;el.download.download=imageName();el.download.setAttribute('aria-disabled','false')},'image/jpeg',.92)}
function csvCell(v){return `"${String(v??'').replaceAll('"','""')}"`}
function download(name,content,type){const blob=new Blob([content],{type}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=name;a.click();URL.revokeObjectURL(url)}
function exportJson(){download('photo-book-records.json',JSON.stringify({version:1,exportedAt:new Date().toISOString(),photoBookRecords:st.history.map(r=>({photoNo:r.photoNumber,category:r.albumCategory,projectName:r.projectName,title:r.workType,station:r.station,location:r.location,shootingDate:r.workDate,photographer:r.worker,memo:r.note,createdAt:r.createdAt}))},null,2),'application/json')}
function exportCsv(){const heads=['写真番号','分類','工事件名','工種','測点','場所','施工日','施工者','備考','作成日時'];const rows=st.history.map(r=>[r.photoNumber,r.albumCategory,r.projectName,r.workType,r.station,r.location,r.workDate,r.worker,r.note,r.createdAt]);download('photo-book-records.csv','\uFEFF'+[heads,...rows].map(row=>row.map(csvCell).join(',')).join('\n'),'text/csv;charset=utf-8')}
el.form.addEventListener('input',()=>{read();board();save()});el.project.addEventListener('change',()=>{st.board.projectName=el.project.value;fill();render();save()});$('#saveProjectButton').onclick=()=>{read();if(st.board.projectName&&!st.projects.includes(st.board.projectName))st.projects.unshift(st.board.projectName);render();save()};$$('.tabs button').forEach(b=>b.onclick=()=>panel(b.dataset.panel));$$('[data-size]').forEach(b=>b.onclick=()=>{st.size=b.dataset.size;$$('[data-size]').forEach(x=>x.classList.toggle('active',x===b));board();save()});$('#copyLastButton').onclick=()=>{if(st.history[0])copy(st.history[0])};$('#duplicateButton').onclick=duplicate;$('#newBoardButton').onclick=()=>{st.board={...def,workDate:new Date().toISOString().slice(0,10)};fill();render();save()};$('#saveButton').onclick=saveBoard;$('#composeButton').onclick=()=>{compose();panel('photoPanel')};el.photoInput.onchange=e=>{const f=e.target.files?.[0];if(!f)return;const img=new Image();img.onload=()=>{st.photo=img;el.photoName.textContent=f.name;compose()};img.src=URL.createObjectURL(f)};$('#clearPhotoButton').onclick=()=>{st.photo=null;el.photoName.textContent='未選択';el.photoInput.value='';compose()};el.pos.onchange=compose;el.scale.oninput=compose;el.history.onclick=e=>{const b=e.target.closest('[data-copy]');if(!b)return;const r=st.history.find(x=>x.id===b.dataset.copy);if(r)copy(r)};$('#exportJsonButton').onclick=exportJson;$('#exportCsvButton').onclick=exportCsv;$('#clearHistoryButton').onclick=()=>{if(!confirm('履歴を削除しますか？'))return;st.history=[];renderHistory();save()};load();fill();render();panel(st.panel||'inputPanel');compose();
</script>
</body>
</html>
